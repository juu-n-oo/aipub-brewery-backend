{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "backend-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-server.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "backend-server.fullname" $ }}
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Values.ingress.frontend.serviceName }}
                port:
                  number: {{ $.Values.ingress.frontend.servicePort | default 80 }}
    {{- end }}
{{- end }}
