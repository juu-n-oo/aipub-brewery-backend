{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  spring.datasource.username: {{ .Values.config.datasource.username | quote }}
  spring.datasource.password: {{ .Values.config.datasource.password | quote }}
  {{- if and .Values.config.brewery.registry.ngc.enabled .Values.config.brewery.registry.ngc.apiKey }}
  ngc-api-key: {{ .Values.config.brewery.registry.ngc.apiKey | quote }}
  {{- end }}
{{- end }}
